<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta http-equiv="refresh" content="0; url=https://kraker.codeberg.page/rhcsa/">
    <title>RHCSA Study Guide moved to Codeberg</title>
    <script>
      const targetOrigin = "https://kraker.codeberg.page";
      const legacyPrefix = "/rhcsa";
      let path = window.location.pathname;

      if (path === legacyPrefix) {
        path = `${legacyPrefix}/`;
      } else if (!path.startsWith(`${legacyPrefix}/`)) {
        path = `${legacyPrefix}${path}`;
      }

      window.location.replace(`${targetOrigin}${path}${window.location.search}${window.location.hash}`);
    </script>
  </head>
  <body>
    <p>
      This RHCSA study guide has moved to
      <a href="https://kraker.codeberg.page/rhcsa/">https://kraker.codeberg.page/rhcsa/</a>.
    </p>
  </body>
</html>
